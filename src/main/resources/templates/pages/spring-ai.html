<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <style>
        /* Chat area */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 530px;
            max-height: 530px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 70%;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.bot.loading {
            min-height: 50px;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 10px;
            background-color: #f1f0f0;
            word-wrap: break-word;
            overflow: hidden;
        }

        .message.bot.loading span {
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        .message.user {
            align-self: flex-end;
            background-color: #dcf8c6;
        }

        .message.bot {
            align-self: flex-start;
            background-color: #f1f0f0;
        }

        /* Input area */
        .input-container {
            display: flex;
            margin-top: 10px;
        }

        .input-container textarea {
            flex: 1;
            resize: none;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
            outline: none;
            height: 50px;
        }

        .input-container button {
            margin-left: 10px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background-color: #4a90e2;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-container button:hover {
            background-color: #357ab7;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="content-card">

        <!-- Card Title -->
        <div class="card-header">
            <h2 th:text="${heading}">Chat with AI</h2>
        </div>

        <div class="card-body">
            <!-- Chat messages -->
            <div class="chat-container" id="chatContainer"></div>

            <!-- Input -->
            <div class="input-container">
                <textarea id="userInput" placeholder="Type your message..."></textarea>
                <button id="sendBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script th:src="@{/js/utils/function.js}"></script>
    <script th:src="@{/js/pages/spring-ai.js}"></script>
</div>
</body>
</html>
