<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/img/logo-fmis-v2-300x190-1.png" rel="shortcut icon">
    <script src="/libs/datatables/jquery-3.6.0.min.js"></script>
    <script src="/libs/jquery-ui/jquery-ui.min.js"></script>
    <script src="/libs/sweetalert2/sweetalert2-2.11.js"></script>
    <link rel="stylesheet" href="/css/login.css">
    <title>{{title}}</title>
</head>
<body>
<div class="container">
    <div class="left">
        <svg class="waves-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 500" preserveAspectRatio="none">
            <path class="w1" fill="rgba(255,255,255,0.04)" d="M0,280 C80,220 160,300 240,260 C320,220 400,300 480,260 C520,240 520,240 520,240 L520,500 L0,500 Z"/>
            <path class="w2" fill="rgba(255,255,255,0.06)" d="M0,320 C90,270 170,350 260,310 C340,275 420,350 520,310 L520,500 L0,500 Z"/>
            <path class="w3" fill="rgba(255,255,255,0.09)" d="M0,370 C100,330 200,390 300,360 C400,330 460,380 520,360 L520,500 L0,500 Z"/>
        </svg>
        <div>
            <img src="/img/logo-fmis-v2-300x190-1.png" alt="Logo" style="max-width: 150px; margin-bottom: 1rem;">
            <h2>Financial Management Information System</h2>
        </div>
    </div>
    <div class="right">
        <div class="login-box">
            <h2>{{heading}}</h2>
            <p>FMIS Proxy Interface</p>

            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username">
                    <div id="username-error" class="error-message" style="display: none;">The Username field is required</div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password">
                        <span onclick="togglePassword()" style="
                            position: absolute; right: 12px; top: 50%;
                            transform: translateY(-50%);
                            cursor: pointer; font-size: 1rem;
                            color: #9CA3AF; user-select: none;
                        " id="eye-toggle">👁</span>
                    </div>
                    <div id="password-error" class="error-message" style="display: none;">The Password field is required</div>
                </div>

                <button type="submit" class="login-btn">
                    <span id="button-text">Log in</span>
                    <svg id="spinner" class="spinner" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" width="24px" height="30px" viewBox="0 0 24 30" style="enable-background:new 0 0 50 50;" xml:space="preserve">
                        <rect x="0" y="10" width="4" height="10" fill="#FFFFFF" opacity="0.2">
                            <animate attributeName="opacity" attributeType="XML" values="0.2; 1; .2" begin="0s" dur="0.6s" repeatCount="indefinite"></animate>
                            <animate attributeName="height" attributeType="XML" values="10; 20; 10" begin="0s" dur="0.6s" repeatCount="indefinite"></animate>
                            <animate attributeName="y" attributeType="XML" values="10; 5; 10" begin="0s" dur="0.6s" repeatCount="indefinite"></animate>
                        </rect>
                        <rect x="8" y="10" width="4" height="10" fill="#FFFFFF" opacity="0.2">
                            <animate attributeName="opacity" attributeType="XML" values="0.2; 1; .2" begin="0.15s" dur="0.6s" repeatCount="indefinite"></animate>
                            <animate attributeName="height" attributeType="XML" values="10; 20; 10" begin="0.15s" dur="0.6s" repeatCount="indefinite"></animate>
                            <animate attributeName="y" attributeType="XML" values="10; 5; 10" begin="0.15s" dur="0.6s" repeatCount="indefinite"></animate>
                            </rect>
                        <rect x="16" y="10" width="4" height="10" fill="#FFFFFF" opacity="0.2">
                            <animate attributeName="opacity" attributeType="XML" values="0.2; 1; .2" begin="0.3s" dur="0.6s" repeatCount="indefinite"></animate>
                            <animate attributeName="height" attributeType="XML" values="10; 20; 10" begin="0.3s" dur="0.6s" repeatCount="indefinite"></animate>
                            <animate attributeName="y" attributeType="XML" values="10; 5; 10" begin="0.3s" dur="0.6s" repeatCount="indefinite"></animate>
                        </rect>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>
<div class="api-prefix" data-api-prefix="{{apiPrefix}}"></div>
<script src="/js/utils/toast.js"></script>
<script src="/js/pages/login.js"></script>
</body>
</html>
